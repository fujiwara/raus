services:
  redis-node-0:
    image: docker.io/redis:7
    network_mode: host
    command: redis-server /usr/local/etc/redis/redis.conf --port 16379
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpass", "-p", "16379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-1:
    image: docker.io/redis:7
    network_mode: host
    command: redis-server /usr/local/etc/redis/redis.conf --port 16380
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpass", "-p", "16380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-2:
    image: docker.io/redis:7
    network_mode: host
    command: redis-server /usr/local/etc/redis/redis.conf --port 16381
    volumes:
      - ./redis-cluster.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpass", "-p", "16381", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cluster-init:
    image: docker.io/redis:7
    network_mode: host
    depends_on:
      redis-node-0:
        condition: service_healthy
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
    command: >
      sh -c "redis-cli -a testpass --cluster create
      127.0.0.1:16379
      127.0.0.1:16380
      127.0.0.1:16381
      --cluster-replicas 0 --cluster-yes"
