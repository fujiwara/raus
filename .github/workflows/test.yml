name: test
on: [push]
jobs:
  test:
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go }}

      - name: setup redis
        uses: shogo82148/actions-setup-redis@b26efc1ddd3c0a06298e9f3ffb4cd405b2d8c57f # v1.48.0
        with:
          redis-version: "7.x"
          auto-start: "false"

      - name: Build & Test
        run: |
          go test -v ./...
