name: cluster test
on: [push]
jobs:
  test:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Start Redis Cluster
        uses: fujiwara/redis-cluster-action@v0
        id: redis
        with:
          password: testpass

      - name: cluster test
        env:
          REDIS_URL: "rediscluster://:${{ steps.redis.outputs.password }}@${{ steps.redis.outputs.host }}:${{ steps.redis.outputs.first-port }}"
        run: |
          go test -v ./...
